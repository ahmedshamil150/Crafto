<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crafto Admin – Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">
  <aside class="admin-sidebar">
    <h2>Crafto Admin</h2>
    <nav>
      <ul>
        <li><a href="./dashboard.html" class="active">Dashboard</a></li>
        <li><a href="./products.html">Products</a></li>
        <li><a href="./orders.html">Orders</a></li>
        <li><a href="./revenue.html">Revenue</a></li>
        <li><a href="./reviews.html">Reviews</a></li>
        <li><a href="../index.html">← Storefront</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>
  </aside>
  <main class="admin-main">
    <h2>Dashboard</h2>

    <h3 class="admin-subtitle" style="margin-top:0;">Overview</h3>
    <div class="admin-stats">
      <div class="stat-card">
        <h3 id="stat-products">–</h3>
        <p>Total Products</p>
      </div>
      <div class="stat-card">
        <h3 id="stat-revenue">–</h3>
        <p>Total Revenue</p>
      </div>
      <div class="stat-card">
        <h3 id="stat-reviews">–</h3>
        <p>Total Reviews</p>
      </div>
    </div>

    <h3 class="admin-subtitle">Orders by Status</h3>
    <div class="admin-stats">
      <div class="stat-card stat-pending">
        <h3 id="stat-pending">–</h3>
        <p>Pending</p>
      </div>
      <div class="stat-card stat-confirmed">
        <h3 id="stat-confirmed">–</h3>
        <p>Confirmed</p>
      </div>
      <div class="stat-card stat-shipped">
        <h3 id="stat-shipped">–</h3>
        <p>Shipped</p>
      </div>
      <div class="stat-card stat-delivered">
        <h3 id="stat-delivered">–</h3>
        <p>Delivered</p>
      </div>
      <div class="stat-card stat-cancelled">
        <h3 id="stat-cancelled">–</h3>
        <p>Cancelled</p>
      </div>
      <div class="stat-card stat-return">
        <h3 id="stat-return-requested">–</h3>
        <p>Return Requested</p>
      </div>
      <div class="stat-card stat-return">
        <h3 id="stat-returned">–</h3>
        <p>Returned</p>
      </div>
    </div>
  </main>
  <script type="module" src="../js/admin.js"></script>
</body>
</html>
