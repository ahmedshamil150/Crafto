<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <meta property="og:title" content="Crafto Admin – Coupons" />
  <meta property="og:description" content="Crafto admin panel – manage coupons." />
  <meta property="og:image" content="../ogimage.jpeg" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Crafto Admin – Coupons</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">
  <button type="button" class="admin-burger" id="admin-burger" aria-label="Menu" aria-expanded="false">☰</button>
  <div class="admin-overlay" id="admin-overlay" aria-hidden="true"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <h2>Crafto Admin</h2>
    <nav>
      <ul>
        <li><a href="./dashboard.html">Dashboard</a></li>
        <li><a href="./products.html">Products</a></li>
        <li><a href="./card-products.html">Card Products</a></li>
        <li><a href="./orders.html">Orders</a></li>
        <li><a href="./revenue.html">Revenue</a></li>
        <li><a href="./coupons.html" class="active">Coupons</a></li>
        <li><a href="./hero.html">Hero</a></li>
        <li><a href="./reviews.html">Reviews</a></li>
        <li><a href="../index.html">← Storefront</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-page-header">
      <h2>Coupons</h2>
    </div>

    <div class="admin-card" style="max-width:100%;margin-bottom:1.5rem;">
      <h3 style="margin-bottom:1rem;font-size:1.05rem;">Create Coupon</h3>
      <form id="coupon-form" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.75rem;">
        <label>Code *
          <input id="c-code" type="text" placeholder="e.g. SAVE10" required style="text-transform:uppercase;" />
        </label>
        <label>Discount (%) *
          <input id="c-discount" type="number" min="1" max="100" required />
        </label>
        <label>Max Uses (0 = unlimited)
          <input id="c-max-uses" type="number" min="0" value="0" />
        </label>
        <label>Expires
          <input id="c-expires" type="date" />
        </label>
        <div style="display:flex;align-items:end;padding-bottom:0.2rem;">
          <button type="submit" class="button" id="create-coupon-btn">Create Coupon</button>
        </div>
      </form>
      <p id="coupon-form-msg" style="color:red;display:none;margin-top:0.75rem;"></p>
    </div>

    <div id="coupons-table"></div>
  </main>
  <script type="module" src="../js/admin.js"></script>
</body>
</html>
