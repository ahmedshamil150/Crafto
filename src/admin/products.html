<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <meta property="og:title" content="Crafto Admin – Products" />
  <meta property="og:description" content="Crafto admin panel – manage products." />
  <meta property="og:image" content="../ogimage.jpeg" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Crafto Admin – Products</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">
  <button type="button" class="admin-burger" id="admin-burger" aria-label="Open menu" aria-expanded="false">☰</button>
  <div class="admin-overlay" id="admin-overlay" aria-hidden="true"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <h2>Crafto Admin</h2>
    <nav>
      <ul>
        <li><a href="./dashboard">Dashboard</a></li>
        <li><a href="./products" class="active">Products</a></li>
        <li><a href="./orders">Orders</a></li>
        <li><a href="./invoices">Invoices</a></li>
        <li><a href="./revenue">Revenue</a></li>
        <li><a href="./categories">Categories</a></li>
        <li><a href="./analytics">Analytics</a></li>
        <li><a href="./coupons">Coupons</a></li>
        <li><a href="./hero">Hero</a></li>
        <li><a href="./reviews">Reviews</a></li>
        <li><a href="..">← Storefront</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-page-header">
      <h2>Products</h2>
      <button class="button" id="add-product-btn">+ Add Product</button>
    </div>
    <div id="product-filters" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center;">
      <select id="filter-category" style="padding:0.4rem 0.6rem;border:1px solid #ddd;border-radius:6px;font-size:0.8rem;">
        <option value="">All Categories</option>
      </select>
      <select id="filter-stock" style="padding:0.4rem 0.6rem;border:1px solid #ddd;border-radius:6px;font-size:0.8rem;">
        <option value="">All Stock</option>
        <option value="in-stock">In Stock</option>
        <option value="out-of-stock">Out of Stock</option>
      </select>
      <button class="product-filter-btn" id="filter-discount" data-active="false">Discounted</button>
      <button class="product-filter-btn" id="filter-variants" data-active="false">Has Variants</button>
    </div>
    <div id="products-table"></div>
  </main>
  <script type="module" src="../js/admin.js"></script>
</body>
</html>
