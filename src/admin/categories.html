<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <meta property="og:title" content="Crafto Admin – Categories" />
  <meta property="og:description" content="Crafto admin panel – manage categories." />
  <meta property="og:image" content="../ogimage.jpeg" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Crafto Admin – Categories</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">
  <button type="button" class="admin-burger" id="admin-burger" aria-label="Menu" aria-expanded="false">☰</button>
  <div class="admin-overlay" id="admin-overlay" aria-hidden="true"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <h2>Crafto Admin</h2>
    <nav>
      <ul>
        <li><a href="./dashboard">Dashboard</a></li>
        <li><a href="./products">Products</a></li>
        <li><a href="./orders">Orders</a></li>
        <li><a href="./invoices">Invoices</a></li>
        <li><a href="./revenue">Revenue</a></li>
        <li><a href="./categories" class="active">Categories</a></li>
        <li><a href="./charges">Charges</a></li>
        <li><a href="./analytics">Analytics</a></li>
        <li><a href="./coupons">Coupons</a></li>
        <li><a href="./hero">Hero</a></li>
        <li><a href="./reviews">Reviews</a></li>
        <li><a href="..">← Storefront</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-page-header">
      <h2>Categories</h2>
    </div>

    <div class="admin-card" style="max-width:100%;margin-bottom:1.5rem;">
      <h3 style="margin-bottom:1rem;font-size:1.05rem;">Add Category</h3>
      <form id="category-form" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0.75rem;align-items:end;">
        <label>Name *
          <input id="c-name" type="text" placeholder="e.g. Rugs" required />
        </label>
        <div style="display:flex;align-items:end;padding-bottom:0.2rem;">
          <button type="submit" class="button" id="create-category-btn">Add Category</button>
        </div>
      </form>
      <p id="category-form-msg" style="color:red;display:none;margin-top:0.75rem;"></p>
    </div>

    <div id="categories-table"></div>
  </main>
  <script type="module" src="../js/admin.js"></script>
</body>
</html>
