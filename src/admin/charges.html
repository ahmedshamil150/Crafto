<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <meta property="og:title" content="Crafto Admin – Charges" />
  <meta property="og:description" content="Crafto admin panel – manage delivery, tax &amp; other charges." />
  <meta property="og:image" content="../ogimage.jpeg" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Crafto Admin – Charges</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">
  <button type="button" class="admin-burger" id="admin-burger" aria-label="Menu" aria-expanded="false">☰</button>
  <div class="admin-overlay" id="admin-overlay" aria-hidden="true"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <h2>Crafto Admin</h2>
    <nav>
      <ul>
        <li><a href="./dashboard">Dashboard</a></li>
        <li><a href="./products">Products</a></li>
        <li><a href="./orders">Orders</a></li>
        <li><a href="./invoices">Invoices</a></li>
        <li><a href="./revenue">Revenue</a></li>
        <li><a href="./categories">Categories</a></li>
        <li><a href="./charges" class="active">Charges</a></li>
        <li><a href="./analytics">Analytics</a></li>
        <li><a href="./coupons">Coupons</a></li>
        <li><a href="./hero">Hero</a></li>
        <li><a href="./reviews">Reviews</a></li>
        <li><a href="..">← Storefront</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-page-header">
      <h2>Charges</h2>
    </div>

    <div class="admin-card" style="max-width:100%;margin-bottom:1.5rem;">
      <h3 style="margin-bottom:1rem;font-size:1.05rem;">Add / Update Charge</h3>
      <form id="charge-form" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.75rem;">
        <label>Key *
          <input id="c-key" type="text" placeholder="e.g. delivery_local_fee" required />
        </label>
        <label>Label *
          <input id="c-label" type="text" placeholder="e.g. Local Delivery Fee" required />
        </label>
        <label>Value *
          <input id="c-value" type="number" step="0.01" min="0" required />
        </label>
        <label>Type
          <select id="c-type">
            <option value="fixed">Fixed (Rs)</option>
            <option value="percentage">Percentage (%)</option>
          </select>
        </label>
        <div style="display:flex;align-items:end;padding-bottom:0.2rem;gap:8px;">
          <button type="submit" class="button" id="save-charge-btn">Save</button>
          <button type="button" class="button" id="cancel-charge-btn" style="display:none;">Cancel</button>
        </div>
      </form>
      <p id="charge-form-msg" style="color:red;display:none;margin-top:0.75rem;"></p>
    </div>

    <div id="charges-table"></div>
  </main>
  <script type="module" src="../js/admin.js"></script>
</body>
</html>
