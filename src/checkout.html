<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crafto – Checkout</title>
  <meta name="description" content="Complete your purchase at Crafto.">
  <link rel="stylesheet" href="./css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="./index.html" class="logo">Crafto</a>
      <button class="burger" id="burger" aria-label="Menu">&#9776;</button>
      <nav id="nav-menu">
        <ul>
          <li><a href="./index.html">Home</a></li>
          <li><a href="./shop.html">Shop</a></li>
          <li><a href="./about.html">About</a></li>
          <li><a href="./contact.html">Contact</a></li>
          <li><a href="./order-status.html">Track Order</a></li>
          <li><a href="./cart.html">Cart <span class="cart-badge"></span></a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container section">
    <h2 class="section-title">Checkout</h2>
    <div class="checkout-grid">
      <form id="checkout-form" class="checkout-form">
        <label>Full Name *
          <input id="name" type="text" placeholder="Your full name" required />
        </label>
        <label>Phone Number *
          <input id="phone" type="tel" placeholder="+92 300 0000000" required />
        </label>
        <label>Delivery Address *
          <textarea id="address" rows="3" placeholder="House no., Street, City, Province" required></textarea>
        </label>
        <div class="coupon-row">
          <input id="coupon-input" type="text" placeholder="Coupon code" autocomplete="off" />
          <button type="button" class="button" id="apply-coupon-btn" style="white-space:nowrap;">Apply</button>
        </div>
        <p id="coupon-msg" class="coupon-msg"></p>
        <button type="submit" class="button" style="width:100%;margin-top:0.5rem;">Place Order (COD)</button>
      </form>
      <div id="order-summary"></div>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Crafto. All rights reserved.</p>
  </footer>

  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/checkout.js"></script>
</body>
</html>
