<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crafto – Contact</title>
  <meta name="description" content="Get in touch with the Crafto team.">
  <link rel="stylesheet" href="./css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="./index.html" class="logo">Crafto</a>
      <button class="burger" id="burger" aria-label="Menu">&#9776;</button>
      <nav id="nav-menu">
        <ul>
          <li><a href="./index.html">Home</a></li>
          <li><a href="./shop.html">Shop</a></li>
          <li><a href="./about.html">About</a></li>
          <li><a href="./contact.html">Contact</a></li>
          <li><a href="./order-status.html">Track Order</a></li>
          <li><a href="./cart.html">Cart <span class="cart-badge"></span></a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container section" style="max-width:560px;">
    <h2 class="section-title">Contact Us</h2>
    <form id="contact-form" style="margin-top:1.5rem;">
      <label>Name *
        <input id="c-name" type="text" placeholder="Your name" required />
      </label>
      <label>Email *
        <input id="c-email" type="email" placeholder="you@example.com" required />
      </label>
      <label>Message *
        <textarea id="c-message" rows="4" placeholder="How can we help?" required></textarea>
      </label>
      <button type="submit" class="button" style="margin-top:0.5rem;">Send Message</button>
      <p id="contact-status" style="margin-top:0.75rem;color:var(--color-primary);"></p>
    </form>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Crafto. All rights reserved.</p>
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
